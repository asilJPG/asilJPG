<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="50%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="200" fill="url(#bg)" rx="0"/>
  
  <!-- subtle grid -->
  <g opacity="0.03" stroke="#ffffff">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="480" y1="0" x2="480" y2="200"/>
    <line x1="640" y1="0" x2="640" y2="200"/>
  </g>
  
  <!-- floating particles -->
  <circle cx="120" cy="45" r="1.5" fill="#c084fc" opacity="0.4">
    <animate attributeName="cy" values="45;35;45" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="680" cy="155" r="1" fill="#60a5fa" opacity="0.3">
    <animate attributeName="cy" values="155;145;155" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="30" r="1" fill="#ff6b6b" opacity="0.3">
    <animate attributeName="cy" values="30;22;30" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="170" r="1.2" fill="#c084fc" opacity="0.25">
    <animate attributeName="cy" values="170;162;170" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="550" cy="60" r="0.8" fill="#60a5fa" opacity="0.35">
    <animate attributeName="cy" values="60;52;60" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- name -->
  <text x="400" y="82" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="#f0f0f0" letter-spacing="2">
    asil aminjanov
  </text>
  
  <!-- gradient line -->
  <rect x="280" y="98" width="240" height="2" rx="1" fill="url(#accent)" filter="url(#glow)">
    <animate attributeName="width" values="0;240" dur="1.5s" fill="freeze"/>
    <animate attributeName="x" values="400;280" dur="1.5s" fill="freeze"/>
  </rect>
  
  <!-- typing subtitle -->
  <text x="400" y="135" text-anchor="middle" font-family="'Courier New', monospace" font-size="15" fill="#8b8ba3" letter-spacing="1">
    building things that matter
    <animate attributeName="opacity" values="0;1" dur="2s" fill="freeze"/>
  </text>
  
  <!-- cursor blink -->
  <rect x="542" y="122" width="8" height="16" fill="#c084fc" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1s" repeatCount="indefinite"/>
  </rect>
  
  <!-- bottom accent dots -->
  <circle cx="370" cy="170" r="3" fill="#ff6b6b" opacity="0.6"/>
  <circle cx="390" cy="170" r="3" fill="#c084fc" opacity="0.6"/>
  <circle cx="410" cy="170" r="3" fill="#60a5fa" opacity="0.6"/>
  <circle cx="430" cy="170" r="3" fill="#34d399" opacity="0.6"/>
</svg>
